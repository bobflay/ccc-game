name: Deploy to GitHub Pages

# Publishes the static site (game at /, dashboard at /dashboard.html) to GitHub Pages.
# Split into build + deploy jobs (the official pattern) so re-running the deploy
# never re-uploads the artifact — avoids the "multiple github-pages artifacts" error.
on:
  push:
    branches:
      - main
  # Lets you trigger a deploy by hand from the Actions tab.
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Build: package the repository root into a Pages artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns on Pages (source = GitHub Actions) via the API
      # on the first run, so the deploy step doesn't fail with
      # "Deployment failed, try again later" when Pages was never enabled.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Assemble a clean site folder (drop VCS history and CI/dev-only files
      # so they aren't published to the public Pages URL).
      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='deploy.sh' \
            ./ _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  # 2) Deploy: publish the artifact produced by the build job.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
